<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <style>
        table, th, tr, td {
            border : 1px solid black;
            padding : 5px 10px;
            text-align: center;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="contents">

        </div>
    </div>
</body>
</html>
<script>
    // 비동기통신
    // ajax
    // 서버와 통신하는 함수 - 보통 데이터를 주고 받는다.
    $.ajax({   //jQuery==$;
        url : "http://192.168.30.57:3009/list", //요청하고자 하는 서버주소
        dataType : "json", // 응답받은 데이터 타입
        type : "GET", // 요청(호출) 방식. 대표적으로 GET, POST
        data : {}, //서버에 요청할 때 보내는 값
        success : function(data){  // 호출이 성공적으로 끝났을 때 실행하는 함수 
            // console.log(data);  //data=[{},{}..];
            console.log(data.list); //data.key
            
            let contents = document.querySelector("#contents");
            let table = document.createElement("table"); //<table></table>
            let tr = document.createElement("tr"); //<tr></tr>

            tr.innerHTML = 
                "<th>학번</th>" 
                + "<th>이름</th>"
                + "<th>학과</th>"
                + "<th>학년</th>"
                + "<th>키</th>"
                + "<th>삭제</th>";
            table.appendChild(tr);
            contents.appendChild(table);

            for(let i=0; i<data.list.length; i++){ //i<10
                let tr = document.createElement("tr"); //<tr></tr>

                tr.innerHTML =
                    `<td>${data.list[i].STU_NO}</td>
                    <td>${data.list[i].STU_NAME}</td>
                    <td>${data.list[i].STU_DEPT}</td>
                    <td>${data.list[i].STU_GRADE}</td>
                    <td>${data.list[i].STU_HEIGHT}</td>
                    <td><button onclick="fnRemove(${data.list[i].STU_NO})">삭제</button></td>`;
                // <tr><td>~</td>~</tr>
                table.appendChild(tr);
            } //=>행 10개 채워짐

        }   
    });

    function fnRemove(stuNo){
        if(!confirm("정말 삭제?")){
            return;
        }

        console.log(stuNo);

        $.ajax({   //jQuery==$;
            url : "http://192.168.30.57:3009/delete", //요청하고자 하는 서버주소
            dataType : "json", // 응답받은 데이터 타입
            type : "GET", // 요청(호출) 방식. 대표적으로 GET, POST
            data : {stuNo : stuNo}, //서버에 요청할 때 보내는 값  // 이부분 잘모르겟음( )
            success : function(data){  // 호출이 성공적으로 끝났을 때 실행하는 함수 
                alert("삭제 되었다!!");
                location.reload();
            }   
        });
    }
</script>
