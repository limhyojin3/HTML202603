<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container {
            width: 800px;
            margin: 50px auto;
        }
        #imageList{
            margin: 20px;
        }
    </style>
</head>

<body>
    <div id="container">
        <div style="text-align: center;">
            <label><input type="checkbox" name="subject" value="java">자바</label>
            <label><input type="checkbox" name="subject" value="oracle">오라클</label>
            <label><input type="checkbox" name="subject" value="html">html</label>
            <label><input type="checkbox" name="subject" value="jquery">jquery</label>
            <button onclick="fnSubject()">클릭!</button>
        </div>
        <hr>
        <div id="imageList">
            <!--<img scr="../media/java.jpg">-->
        </div>

    </div>
</body>

</html>
<script>
    function fnSubject(){
        let subject = document.querySelectorAll("input[name='subject']:checked");

        //객체를 담은 리스트가 됨
        //<input type="checkbox" name="subject" value="java">자바
        //<input type="checkbox" name="subject" value="oracle">오라클

        let imgList = document.querySelector("#imageList");
        imgList.innerHTML = "";

        //리스트는 인덱스로 접근

        // let img = document.createElement("img"); //<img>
        // img.scr = "../media/java.jpg"; //<img scr="../media/java.jpg">
        // imgList.appendChild(img); //<div><img scr="../media/java.jpg"></div>


        
        for(let i=0; i <subject.length; i++){

            console.log(subject[i].value); //java,oracle


            let img = document.createElement("img"); //<img> //** 함수이름 똑바로! createElement
            img.src = "../media/" + subject[i].value + ".jpg";
            //<img src="../media~">

            img.width = 150;
            img.height = 150;
            img.style.margin = "10px";
            img.style.border = "1px solid black";

            imgList.appendChild(img);
        }
    }
</script>
