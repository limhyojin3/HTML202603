<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <!-- html. 반드시 id가 app인 태그 안에서 작업 -->
        <!-- (script 맨 하단 app.mount('#app'); 여기 아이디와 같아야 함) -->

        <div>
            <label><input type="checkbox" name="subject" v-model="subject" value="java">자바</label> <!-- 1.체크하면 -->
            <label><input type="checkbox" name="subject" v-model="subject" value="oracle">오라클</label>
            <label><input type="checkbox" name="subject" v-model="subject" value="html">HTML</label>
            <label><input type="checkbox" name="subject" v-model="subject" value="react">react</label>
            <label><input type="checkbox" name="subject" v-model="subject" value="flutter">flutter</label>
        </div>
        <hr>
        {{subject}} <!-- => [ "java", "html", "oracle" ]-->
    </body>
</html>

<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                subject : [] // 초기값  //v-model="subject" //2.subject=[value값이 들어감]
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            

        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
        }
    });

    app.mount('#app');
</script>
