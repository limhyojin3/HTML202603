<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            display: grid;
            grid-template-columns: 200px minmax(600px,auto);
            grid-template-rows: 200px minmax(600px,auto);
            grid-template-areas: 
            "header header"
            "side contents";
        }
        #container div{
            border: 1px solid gray;
        }
        .header{
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .side{
            grid-area: side;
        }
        .contents{
            grid-area: contents;
            display: flex;
            flex-wrap: wrap; 
            gap:10px;
            margin-left: 20px;
            margin-top: 20px;
        }

        .card{
            width: 200px;
            height: 250px;
            border-radius: 10px;
        }
        #logo{
            padding: 50px;
            margin-left: 20px;
        }
        #search{
            padding: 50px;
        }
        #user{
            padding: 50px;
            margin-right: 20px;
        }
        #category{
            height: 240px;
        }
        #price{
            height: 240px;
        }

        #list{
            list-style: none;

        }
        #list li:hover{
            background-color: rgb(71, 175, 175);
            color:white;
        }
        #list li{
            padding-left: 10px;
            margin-left: -30px;
            cursor: pointer;
        }
        #logo img{
            cursor: pointer;
            margin-left: -30px;
        }
        #search input{
            height: 30px;
            width: 150px;
            border: 1px solid gray;
        }
        #search button{
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 10px;
            border: 1px solid gray;
            margin-left: 10px;
        }
        #search{
            height: 3px;
        }
        

    </style>
</head>
