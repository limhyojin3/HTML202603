<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <style>
        #container{
            display: flex;
            justify-content: center;
        }
        #contents{
            margin-top: 100px;
            height: 400px;
            border: 0 solid gray;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0px 0px 5px 2px rgb(190, 190, 190);
        }
        #login{
            padding: 10px;
            width: 274px;
            margin-top: 30px;
            border-radius: 10px;
            border: none;
            background-color: rgb(79, 169, 230); 
            color: white; 
            font-weight: bold;
            cursor: pointer;
        }
        #login:hover{
            background-color: rgb(62, 132, 179);
        }
        input{
            border-radius: 10px;
            border: 1px solid rgb(214, 214, 214);
        }
    </style>
</head>
<body id="container">
    <div id="app">

        <div id="contents">
            <h1 style="text-align: center;">환영합니다</h1>
            <p style="color:gray; text-align: center;">서비스 이용을 위해 로그인해주세요.</p>
            <div style="font-weight: bold; height: 30px;">아이디</div>
            <div><input placeholder="아이디를 입력해주세요." style="padding: 10px; width: 250px;" v-model="userId"></div>
            <div style="font-weight: bold; height: 30px; margin-top: 20px;" >비밀번호</div>
            <div><input placeholder="비밀번호를 입력하세요." style="padding: 10px; width: 250px;" v-model="pwd"></div>
            <div><button id="login" @click="fnLogin">로그인</button></div>
            <div style="color: gray; text-align: center; margin-top: 20px;" >
                <span style="margin-right: 10px;">
                    <a href="" style="text-decoration: none; color: gray;">비밀번호 찾기</a>
                </span> | 
                <span style="margin-left: 10px;">
                    <a href="Join.html" style="text-decoration: none; color: gray;">회원가입</a>
                </span>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                userId : "",
                pwd : ""
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnLogin : function () {
                let self = this;
                let param = {
                    userId: self.userId,
                    pwd: self.pwd
                }
                
                $.ajax({
                    url: "http://192.168.30.57:3009/login",
                    dataType: "json",
                    type: "GET",
                    data: param,
                    success: function (data) {
                        console.log(data);
                        alert(data.message);

                        if(data.success){
                            location.href="Main.html";
                        }
                        
                        

                        
                    }
                });
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
        }
    });

    app.mount('#app');
</script>
