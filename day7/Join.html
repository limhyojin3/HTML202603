<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        #container{
            display: flex;
            justify-content: center;
        }
        #contents{
            margin-top: 100px;
            height: 600px;
            border: 0 solid gray;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0px 0px 5px 2px rgb(190, 190, 190);
        }
        #register{
            padding: 10px;
            width: 274px;
            margin-top: 30px;
            border-radius: 10px;
            border: none;
            background-color: rgb(79, 169, 230); 
            color: white; 
            font-weight: bold;
            cursor: pointer;
        }
        #register:hover{
            background-color: rgb(62, 132, 179);
        }
        input{
            border-radius: 10px;
            border: 1px solid rgb(214, 214, 214);
        }
        #duplicateCk:hover{
            background-color: rgb(196, 196, 196);
        }
    </style>
</head>
<body id="container">
    <div id="app">

        <div id="contents">
        <h1 style="text-align: center;">회원가입</h1>
        <p style="color:gray; text-align: center;">새로운 계정을 만들어 서비스를 시작하세요.</p>
        <div style="font-weight: bold; height: 30px; margin-top: 30px;">이름</div>
        <div><input placeholder="홍길동" style="padding: 10px; width: 250px;"></div>
        <div style="font-weight: bold; height: 30px; margin-top: 20px;">아이디</div>
        <div>
            <input v-model="userId" placeholder="아이디를 입력해주세요." style="padding: 10px; width: 160px;">
            <button id="duplicateCk" @click="fnCheck" style="cursor: pointer; margin-left: 14px; padding: 5px 10px; border-radius: 5px; border: 1px solid gray; ">중복체크</button>
        </div>
        <div style="font-weight: bold; height: 30px; margin-top: 20px;" >비밀번호</div>
        <div><input v-model="pwd" placeholder="8자 이상 입력" style="padding: 10px; width: 250px;"></div>
        <div style="font-weight: bold; height: 30px; margin-top: 20px;" >비밀번호 확인</div>
        <div><input placeholder="비밀번호를 다시 입력하세요." style="padding: 10px; width: 250px;"></div>
        <div><button id="register" >가입하기</button></div>
        <div style="color: gray; text-align: center; margin-top: 20px;">
            <span style="margin-right: 10px;">이미 계정이 있으신가요?</span>
            <span>
                <a href="Login.html" style="text-decoration: none; color: rgb(51, 152, 219); font-weight: bold;">로그인</a>
            </span>
        </div>
    </div>
</body>
</html>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // 변수 - (key : value)
                userId : ""
            };
        },
        methods: {
            // 함수(메소드) - (key : function())
            fnCheck : function () {
                let self = this;
                let param = {
                    userId: self.userId
                }
                
                $.ajax({
                    url: "http://192.168.30.57:3009/id-check",
                    dataType: "json",
                    type: "GET",
                    data: param,
                    success: function (data) {
                        console.log(data);
                        
                        alert(data.message);

                        if(data.success){
                            location.href="Main.html";
                        }
                        
                    }
                });
            }
        }, // methods
        mounted() {
            // 처음 시작할 때 실행되는 부분
        }
    });

    app.mount('#app');
</script>
