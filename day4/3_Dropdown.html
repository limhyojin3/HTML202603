<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .top-menu{
            display: inline-block;
        }
        .main-menu{
            background-color: green;
            color: white;
            font-weight: bold;
            width: 150px;
            padding: 10px;
            box-sizing: border-box;
            cursor: pointer; /* 갖다대면 마우스 모양이 바뀜*/
        }

        .sub-menu{
            background-color: beige;
            width: 150px;
            display: none; /* 화면에서 사라지게됨 */
        }
        
        .sub-menu a{
            display: block;
            padding: 10px;
            cursor: pointer;
        }

        .top-menu:hover .sub-menu{
            display: block;
        }

        .sub-menu a:hover{
            background-color: antiquewhite;
        }


    </style>
</head>
<body>
    <div class="top-menu">
        <div class="main-menu">Dropdown</div>
        <div class="sub-menu">
            <a>Menu1</a>
            <a>Menu2</a>
            <a>Menu3</a>
        </div>
    </div>
    
</body>
</html>
