<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 150px;
            height: 150px;
            border:2px solid black;
            margin-top: 5px;
        }
        .box1{background-color: aqua;}
        .box2{
            background-color: bisque;
            position: relative;  /* 원래있어야할 위치(static위치)를 기준으로*/
            top:20px;            /* 이동가능*/
            left:50px;
        }
        .box3{
            background-color: blueviolet;
            position: fixed;    /* 좌표값을 기준으로 이동, body가 기준!*/
            top: 30px;
            right: 50px;       /* right 로부터 50px 만큼 떨어져있음 */
        }
        .box4{
            background-color: blue;
            position: absolute;  /* 부모중 static이 아닌애를 기준으로 정렬 */
            top: 50px;
            left: 50px;      
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <br><br>
    <hr>
    <!--<div class="box4"></div>--> <!--현재 부모는 body --> 
    <div style="width: 500px; height: 500px; position: relative"> <!-- static이 아닌애-->
        <div class="box4"></div> <!--현재부모는 500 500 박스(static이 아닌애)-->
    </div>


    <div style=" margin-top: 1000px;"></div>

</body>
</html>
