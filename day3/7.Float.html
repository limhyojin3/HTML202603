<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            border: 2px solid black;
            text-align: center;
            line-height: 200px; 
            color:white;
        }

        .box1{
            background-color: black;
            /* float: right; */
            float: left;

        }

        .box2{
            background-color: blue;
            float: left;  /* float 요소끼리는 겹치지않고 차곡차곡 정렬됨*/
        }
        .box3{
            background-color: green;
            clear:both;  /* float 속성 그만두겟다 명시하는거*/
        
        }
    </style>
</head>
<body>
    <!-- float 는 화면 공중에 떠있는 느낌 => 다음에 올 요소들이 영향을 받지않음(거의 3차원느낌)-->
    <div class="box1">box1</div>
    <div class="box2">box2</div>
    <div class="box3">box3</div>
</body>
</html>
