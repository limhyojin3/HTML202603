<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            border: 2px solid black;
            text-align: center;
            line-height: 200px; /*이건머지?*/
            color:white;
        }

        .box1{
            background-color: black;

        }

        .box2{
            background-color: blue;
            position: absolute;
            top: 10px;
            left:30px;
        
        }

        .box3{
            background-color: green;
            position: absolute;
            top: 30px;
            left: 30px;
        }
        /*position : static(default), relative, fixed, absolute */
    </style>
</head>
<body>
    <!-- absolute 는 부모 요소의 영향을 받아서 배치 -->
    <!-- 부모(상위) 요소 중에서 static 이 아닌 요소를 기준으로 배치 -->
    <!-- 부모(상위) 요소가 모두 static 일 경우 (static 아닌 부모를 못찾을 경우) -->
    <!-- body 태그를 기준으로 배치된다. -->
    <!-- relative 랑 조합해서 많이 사용된다. -->
    <div class="box1"></div>
    <div class="box2"></div>
    <hr>

    <div style="width: 700px; height:400px; position: relative;">  
        <div class="box3"></div>
    </div>
</body>
