<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid мӢӨмҠө мҷ„м„ұліё</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8.4.7/swiper-bundle.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/swiper@8.4.7/swiper-bundle.min.js"></script>

  <style>
        .swiper {
            width: 100%;
            height: auto;
            /* wdith : 800px л“ұ мӣҗн•ҳлҠ” нҒ¬кё° к°ҖлҠҘ */
        }
        /* мҠ¬лқјмқҙл“ң м•Ҳмқҳ мқҙлҜём§Җк°Җ мҳҒм—ӯм—җ л”ұ л§һкІҢ л“Өм–ҙк°ҖлҸ„лЎқ м„Өм • */
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            display: block;
        }
  </style>


</head>


<body>

  <div id="app" class="dashboard-container">

    <div class="box header">
      <div class="header-logo">
        <img src="logo.png" class="logo-image">
      </div>

      <div class="header-search">
        <input type="text" placeholder="кІҖмғүм–ҙлҘј мһ…л Ҙн•ҳм„ёмҡ”..." v-model="keyword" @keyup.enter="fnList">
        <button type="button" class="search-btn" @click="fnList">кІҖмғү</button>
      </div>

      <div class="header-utils">
        <button class="notification-btn">
          рҹ””
          <span class="badge">3</span>
        </button>
        <div class="user-profile">
          <div class="avatar" @click="fnMypage">рҹ‘ЁвҖҚрҹ’»</div>
          <span class="username" @click="fnMypage">{{sessionName}}</span>
          <button @click="fnLogout">лЎңк·ём•„мӣғ</button>
        </div>
      </div>
    </div>
    <div class="box side">
      <div class="side-title">м№ҙн…Ңкі лҰ¬</div>
      <ul class="category-list">
        <li><a href="#" class="active" @click="fnCategory('')">м „мІҙ мғҒн’Ҳ</a></li>

        <li v-for="item in categoryList">
          <a href="javascript:;" @click="fnCategory(item.CATEGORY)">{{item.CATEGORY}}</a> 
        </li>                             <!--мқёмһҗк°’мңјлЎң dbм—җ мһҲлҠ” к°’мқ„ л„ҳкІЁмӨҳлҸ„лҗЁ.-->

        <!-- <li><a href="#" @click="fnCategory('мҠӨл§ҲнҠёнҸ°')">мҠӨл§ҲнҠёнҸ°</a></li>
        <li><a href="#" @click="fnCategory('кІҢмһ„кё°')">кІҢмһ„кё°</a></li>
        <li><a href="#" @click="fnCategory('л…ёнҠёл¶Ғ')">л…ёнҠёл¶Ғ</a></li>
        <li><a href="#" @click="fnCategory('нғңлё”лҰҝ')">нғңлё”лҰҝ</a></li> -->
      </ul>

      <div class="side-title">к°ҖкІ©лҢҖ</div>
      <ul class="filter-list">
        <li><label><input type="checkbox"> 1л§Ңмӣҗ мқҙн•ҳ</label></li>
        <li><label><input type="checkbox"> 1л§Ңмӣҗ ~ 3л§Ңмӣҗ</label></li>
        <li><label><input type="checkbox"> 3л§Ңмӣҗ ~ 5л§Ңмӣҗ</label></li>
        <li><label><input type="checkbox"> 5л§Ңмӣҗ мқҙмғҒ</label></li>
      </ul>
    </div>
    <div class="box banner">
      <div class="swiper">
          <div class="swiper-wrapper">
              <div class="swiper-slide"><img src="banner/banner1.png"></div>
              <div class="swiper-slide"><img src="banner/banner2.png"></div>
              <div class="swiper-slide"><img src="banner/banner3.png"></div>
              <div class="swiper-slide"><img src="banner/banner4.png"></div>
              <div class="swiper-slide"><img src="banner/banner5.png"></div>
          </div>
          <div class="swiper-pagination"></div>
          <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div>
      </div>
    </div>

    <div class="box content">
      <div class="product-card" v-for="item in list" @click="fnInfo(item.PRODUCT_ID)":>  <!-- listліҖмҲҳм—җ мһҲлҠ”кұё мҲңнҡҢ-->
        <img :src="item.IMG_PATH" alt="мғҒн’Ҳ 1" class="product-img"> <!-- :(мҪңлЎ ) м—Ҷмңјл©ҙ л¬ёмһҗм—ҙлЎңл§Ң мқёмӢқлҗЁ. : л¶ҷм—¬мЈјл©ҙ мЈјмҶҢлЎң мқёмӢқ-->
        <div class="product-info">
          <div class="product-name">{{item.PRODUCT_NAME}}</div>
          <div class="product-category">{{item.CATEGORY}}</div>
          <div class="product-price">{{item.PRICE_WON}}мӣҗ</div>
        </div>
      </div>
    </div>

    <div class="box footer">н•ҳлӢЁ мҳҒм—ӯ~~</div>
  </div>

</body>

</html>
<script>
    const app = Vue.createApp({
        data() {
            return {
                // ліҖмҲҳ - (key : value)  // ліҖмҲҳм—җлҠ” 1.v-modelлЎң м–»м–ҙмҳЁкұ° л§җкі лҸ„ 2.dbм—җм„ң м–»м–ҙмҳЁкұ°лҘј лӢҙмқ„мҲҳмһҲмқҢ. лҳҗлҠ” 3.htmlм—җм„ң мқёмһҗлЎң л°ӣмқҖк°’мқ„ лӢҙмқ„мҲҳмһҲмқҢ.
                list : [],  //к°Җм ёмҳЁк°’мқ„ self.listм—җ лӢҙлҠ”лӢӨ
                categoryList : [],
                keyword : "",
                category : "",
                sessionName: ""
                
            };
        },
        methods: {
            // н•ЁмҲҳ(л©”мҶҢл“ң) - (key : function())
            
            fnList: function () {
                let self = this;
                $.ajax({
                    url: "http://192.168.30.57:3009/product/list",
                    dataType: "json",
                    type: "GET",
                    data: {keyword : self.keyword, brand : "", category : self.category}, //мҷјмӘҪмқҖ dbм—җ мһҲлҠ” м»¬лҹјлӘ…, мҳӨлҘёмӘҪмқҖ лӮҙк°Җ ліҙлӮҙлҠ” к°’
                    success: function (data) {
                        console.log(data);
                        self.list = data.productList;
                    }
                });
            },
            fnCategory : function(category){
              let self = this;
              self.category = category;  //** v-model м—Ҷмқҙ мқёмһҗлЎң л°ӣмқҖк°’мқ„ ліҖмҲҳм—җ м „лӢ¬!

              self.fnList();
            },
            fnCategoryList: function () {
                let self = this;

                $.ajax({
                    url: "http://192.168.30.57:3009/category/list",
                    dataType: "json",
                    type: "GET",
                    data: {}, //лӮҙк°ҖліҙлӮҙлҠ”к°’мқҙ м—Ҷмқ„л•ҢлҠ” л№Ҳк°’
                    success: function (data) {
                        console.log(data);

                        self.categoryList = data.categoryList; //data м•Ҳм—җмһҲлҠ” categoryListм—җ мһҲлҠ”кІғмқ„ selfмқҳ categoryListм—җ лӢҙлҠ”лӢӨ.
                    }
                });
            },
            fnInfo : function(productId){ //function(4)
              // product-info.html
              location.href = "product-info.html?productId=" + productId;

            },
            fnInit: function() {
                const swiper = new Swiper('.swiper', {
                    loop: true,
                    autoplay: {
                        delay: 2500,
                    },
                    pagination: {
                        el: '.swiper-pagination',
                        clickable: true,
                    },
                    navigation: {
                        nextEl: '.swiper-button-next',
                        prevEl: '.swiper-button-prev',
                    },
                });
            },
            fnLogout: function(){
              localStorage.clear();
              location.href="Login.html";
            }
        }, // methods
        mounted() {
            // мІҳмқҢ мӢңмһ‘н•  л•Ң мӢӨн–үлҗҳлҠ” л¶Җл¶„
            let self = this;
            self.fnCategoryList();

            self.fnList();
            self.fnInit();
            console.log("localName => ", localStorage.getItem("sessionName"));

            if(localStorage.getItem("sessionName") == null){
              alert("лЎңк·ёмқё нӣ„ мқҙмҡ©н•ҙмЈјм„ёмҡ”");
              location.href = "Login.html";
            }

            self.sessionName = localStorage.getItem("sessionName");
        }
    });

    app.mount('#app');
</script>
