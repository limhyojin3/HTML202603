<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            display: grid;
            grid-template-columns: 300px 1fr;
            grid-template-rows: 150px minmax(600px, auto) 150px;
            grid-template-areas: 
            "header header"
            "side content"
            "footer footer";
            gap:20px;
        }

        #container > div{
            border : 1px solid black;
            text-align: center;
            padding:10px;
        }
        .header{grid-area:header;}
        .side{grid-area:side;}
        .content{grid-area:content;}
        .footer{grid-area:footer;}
    </style>
</head>
<body>
    <div id="container">
        <div class="header">헤더다~~</div>
        <div class="side">사이드!!</div>
        <div class="content">컨텐츠!!</div>
        <div class="footer">푸터~~</div>
    </div>
</body>
</html>
